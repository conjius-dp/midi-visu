<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>midi-visu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #101010;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #32cd32;
        }

        p {
            font-size: 1.1rem;
            color: #b0b0b0;
            margin-bottom: 2rem;
        }

        a.repo-link {
            display: inline-block;
            padding: 0.75rem 2rem;
            border: 1px solid #32cd32;
            border-radius: 6px;
            color: #32cd32;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.2s, color 0.2s;
        }

        a.repo-link:hover {
            background-color: #32cd32;
            color: #101010;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>midi-visu</h1>
    <p>Real-time MIDI visualizer — JUCE audio plugin</p>
    <a class="repo-link" href="https://github.com/conjius/midi-visu">View on GitHub</a>
</div>
</body>
</html>
